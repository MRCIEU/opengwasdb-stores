source_collection_id: gwas-catalog-ssf
label: GWAS Catalog harmonised GWAS-SSF
provider: EBI GWAS Catalog
source_format: gwas-ssf
source_reader_capability: opengwasdb.gwas-ssf
access_posture: public
default_license: EBI GWAS Catalog terms of use
description: >
  Homogeneous collection of GWAS Catalog harmonised summary statistics
  distributed as GWAS-SSF (`<GCST>.h.tsv.gz`) on the EBI FTP, GRCh38. Molecular-
  QTL analyses from this collection feed the ragged sparse-region build:
  the Manifest Generator downloads each analysis, filters it to cis + significant
  / suggestive trans regions, and opengwasdb ingests the filtered inputs via the
  ragged GWAS-SSF reader (`opengwasdb.layouts.ragged.build_ssf`).
