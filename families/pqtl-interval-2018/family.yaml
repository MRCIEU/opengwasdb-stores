store_family_id: pqtl-interval-2018
label: INTERVAL plasma proteome pQTL (Sun et al. 2018)
source_collection_id: gwas-catalog-ssf
access_posture: public
release_cadence: one-off
description: >
  Ragged cis-and-signals pQTL store for the INTERVAL SomaScan plasma proteome
  (Sun et al. 2018, PMID 29875488, European ancestry), built from filtered
  harmonised GWAS-SSF via the shared `gwas-ssf-ragged` generator. First ragged
  store and the end-to-end proof of the GWAS-SSF -> ragged pipeline.
query_promise:
  coverage: cis_and_signals
  expected_layouts:
    - ragged-observed
priority:
  value: high
  readiness: high
  rationale: >
    Proves the download+filter -> ragged-ingest pipeline end to end and
    establishes the shared generator + two-repo interface for molecular
    GWAS-SSF stores.
